services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocrscore-backend
    ports:
      - "8000:8000"
    environment:
      - OCRSCORE_DATABASE_URL=postgresql+asyncpg://ocrscore:ocrscore@db:5432/ocrscore
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd backend && alembic upgrade head && cd /app && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ocrscore-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ocrscore
      POSTGRES_USER: ocrscore
      POSTGRES_PASSWORD: ocrscore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocrscore -d ocrscore"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: ocrscore-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      sh -c "if [ -f package.json ]; then
        npm install && npx vite --host 0.0.0.0 --port 5173
      else
        echo 'Frontend scaffold not ready' && tail -f /dev/null
      fi"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
